<svg width="600" height="450" viewBox="0 0 400 350" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Inter', sans-serif; background-color: #FAFAFA; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
  <!-- Consistency -->
  <circle cx="150" cy="130" r="100" fill="rgba(41, 154, 141, 0.15)" stroke="#299a8d" stroke-width="3"/>
  <text x="110" y="80" font-size="16" font-weight="800" fill="#161c24">Consistency</text>
  
  <!-- Availability -->
  <circle cx="250" cy="130" r="100" fill="rgba(218, 82, 51, 0.15)" stroke="#da5233" stroke-width="3"/>
  <text x="240" y="80" font-size="16" font-weight="800" fill="#161c24">Availability</text>
  
  <!-- Partition Tolerance -->
  <circle cx="200" cy="216" r="100" fill="rgba(74, 124, 143, 0.15)" stroke="#4a7c8f" stroke-width="3"/>
  <text x="140" y="280" font-size="16" font-weight="800" fill="#161c24">Partition Tolerance</text>
  
  <!-- Intersections -->
  <!-- CA -->
  <text x="185" y="125" font-size="14" font-weight="bold" fill="#161c24">CA</text>
  <text x="175" y="140" font-size="10" font-weight="600" fill="#454f5b">RDBMS</text>
  
  <!-- CP -->
  <text x="135" y="190" font-size="14" font-weight="bold" fill="#161c24">CP</text>
  <text x="105" y="205" font-size="10" font-weight="600" fill="#454f5b">Bigtable/HBase</text>
  
  <!-- AP -->
  <text x="245" y="190" font-size="14" font-weight="bold" fill="#161c24">AP</text>
  <text x="240" y="205" font-size="10" font-weight="600" fill="#454f5b">DynamoDB</text>

  <!-- CAP (Center) -->
  <text x="195" y="170" font-size="24" font-weight="900" fill="#da5233">?</text>
  <text x="160" y="190" font-size="10" font-weight="600" fill="#da5233">(Impossible)</text>
</svg>
