<!DOCTYPE html>
<html lang="vi">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0B1XQQ61EY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0B1XQQ61EY');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiz - AI-900</title>
  <meta name="description"
    content="AI-900 Practice Quiz - 115 questions">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
</head>

<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <a href="../../" class="icon-btn home-btn" title="Về trang chủ" style="text-decoration: none; margin-right: 8px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span class="home-text">Trang chủ</span>
      </a>
      <select id="selectQuiz" class="quiz-select">
        <option value="databricks-de-advanced">DE Professional</option>
        <option value="databricks-genai-associate">GenAI Associate</option>
      </select>
      <span class="question-counter" id="questionCounter">1 / 92</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="btnViToggle" title="Bật/Tắt Tiếng Việt">
        <span class="btn-label">VI</span>
      </button>
      <button class="icon-btn" id="btnShuffle" title="Xáo trộn câu hỏi">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"></polyline>
          <line x1="4" y1="20" x2="21" y2="3"></line>
          <polyline points="21 16 21 21 16 21"></polyline>
          <line x1="15" y1="15" x2="21" y2="21"></line>
          <line x1="4" y1="4" x2="9" y2="9"></line>
        </svg>
      </button>
      <button class="icon-btn" id="btnMenu" title="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
  </header>

  <!-- Score Bar -->
  <div class="score-bar">
    <div class="score-item correct">
      <span class="score-icon">✓</span>
      <span class="score-value" id="scoreCorrect">0</span>
    </div>
    <div class="score-item incorrect">
      <span class="score-icon">✗</span>
      <span class="score-value" id="scoreIncorrect">0</span>
    </div>
    <div class="score-item unanswered">
      <span class="score-icon">○</span>
      <span class="score-value" id="scoreUnanswered">115</span>
    </div>
    <div class="score-progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- Main Quiz Content -->
  <main class="quiz-container">
    <div class="question-card" id="questionCard">
      <!-- Question -->
      <div class="question-header">
        <span class="question-badge" id="questionBadge">Question #1</span>
        <span class="topic-badge" id="topicBadge">Topic 1</span>
        <button class="icon-btn pdf-btn" id="btnPdf" title="Mở trang PDF gốc">PDF</button>
        <button class="icon-btn pdf-btn" id="btnImage" title="Xem ảnh trang PDF">Ảnh</button>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="question-text-vi" id="questionTextVi" style="display:none"></div>
      <div class="question-image" id="questionImageBox" style="display:none">
        <img id="questionImage" alt="Ảnh trích xuất từ PDF">
      </div>

      <!-- Options -->
      <div class="options-list" id="optionsList"></div>


    </div>
  </main>

  <!-- Navigation -->
  <nav class="quiz-nav">
    <button class="nav-btn" id="btnPrev" title="Câu trước">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      <span>Trước</span>
    </button>
    <button class="nav-btn grid-btn" id="btnGrid" title="Danh sách câu hỏi">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      <span>DS Câu</span>
    </button>
    <button class="nav-btn" id="btnNext" title="Câu sau">
      <span>Sau</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </nav>

  <!-- Side Panel (Menu) -->
  <div class="overlay" id="overlay"></div>
  <aside class="side-panel" id="sidePanel">
    <div class="panel-header">
      <h2>Cài đặt & Ôn tập</h2>
      <button class="close-btn" id="btnClosePanel">✕</button>
    </div>
    <div class="panel-content">
      <!-- Stats -->
      <div class="panel-section">
        <h3>Thống kê</h3>
        <div class="stats-grid">
          <div class="stat-box stat-correct">
            <div class="stat-number" id="statCorrect">0</div>
            <div class="stat-label">Đúng</div>
          </div>
          <div class="stat-box stat-incorrect">
            <div class="stat-number" id="statIncorrect">0</div>
            <div class="stat-label">Sai</div>
          </div>
          <div class="stat-box stat-unanswered">
            <div class="stat-number" id="statUnanswered">92</div>
            <div class="stat-label">Chưa làm</div>
          </div>
          <div class="stat-box stat-total">
            <div class="stat-number" id="statTotal">92</div>
            <div class="stat-label">Tổng</div>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <div class="panel-section">
        <h3>Cài đặt</h3>
        <div class="setting-row">
          <label for="toggleVi">Hiện bản dịch tiếng Việt</label>
          <label class="switch">
            <input type="checkbox" id="toggleVi">
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <label for="toggleShuffle">Xáo trộn thứ tự câu hỏi</label>
          <label class="switch">
            <input type="checkbox" id="toggleShuffle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Review Modes -->
      <div class="panel-section">
        <h3>Chế độ ôn tập</h3>
        <div class="review-buttons">
          <button class="review-btn review-all" id="btnReviewAll">
            
            <span>Tất cả câu hỏi</span>
            <span class="review-count" id="countAll">92</span>
          </button>
          <button class="review-btn redo-incorrect" id="btnRedoIncorrect">
            <span>Làm lại câu sai</span>
            <span class="review-count" id="countRedoIncorrect">0</span>
          </button>
          <button class="review-btn review-incorrect" id="btnReviewIncorrect">
            <span>Xem lại câu sai</span>
            <span class="review-count" id="countIncorrect">0</span>
          </button>
          <button class="review-btn review-correct" id="btnReviewCorrect">
            
            <span>Xem lại câu đúng</span>
            <span class="review-count" id="countCorrect">0</span>
          </button>
          <button class="review-btn review-unanswered" id="btnReviewUnanswered">
            <span class="review-icon">⬜</span>
            <span>Làm câu chưa làm</span>
            <span class="review-count" id="countUnanswered">92</span>
          </button>
        </div>
      </div>

      <!-- Reset -->
      <div class="panel-section">
        <h3>🗑️ Đặt lại</h3>
        <div class="review-buttons">
          <button class="reset-btn" id="btnResetAll">
            <span>Reset tất cả</span>
          </button>
          <button class="reset-btn reset-incorrect" id="btnResetIncorrect">
            <span>↩️ Reset câu sai</span>
          </button>
          <button class="reset-btn reset-correct" id="btnResetCorrect">
            <span>↩️ Reset câu đúng</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Question Grid Modal -->
  <div class="modal-overlay" id="gridModal">
    <div class="grid-modal-content">
      <div class="grid-modal-header">
        <h2>Danh sách câu hỏi</h2>
        <div class="grid-filter-tabs">
          <button class="grid-tab active" data-filter="all">Tất cả</button>
          <button class="grid-tab" data-filter="correct">Đúng</button>
          <button class="grid-tab" data-filter="incorrect">Sai</button>
          <button class="grid-tab" data-filter="unanswered">Chưa làm</button>
        </div>
        <button class="close-btn" id="btnCloseGrid">✕</button>
      </div>
      <div class="question-grid" id="questionGrid"></div>
    </div>
  <!-- Scripts -->
  <script src="../shared/app.js?v=20260608"></script>
  <script src="../../reading-panel.js" defer></script>
</body>

</html>
