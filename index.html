<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative AI Engineer - Ôn tập Chứng chỉ Databricks</title>
    <meta name="description" content="Nền tảng ôn tập chứng chỉ Databricks Generative AI Engineer.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-brain"></i>
                <h1>GenAI <span class="highlight">Mastery</span></h1>
            </div>
            <div class="progress-container">
                <div class="progress-stats">
                    <span id="question-counter">Câu hỏi 0 / 0</span>
                    <span id="score-counter"><i class="fa-solid fa-star"></i> Điểm: 0</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>
        </header>

        <main id="quiz-container" class="glass-panel">
            <div class="loading-state" id="loading-state">
                <div class="spinner"></div>
                <p>Đang tải dữ liệu câu hỏi...</p>
            </div>

            <div class="question-section hidden" id="question-section">
                <div class="question-header">
                    <span class="question-badge" id="question-type-badge">Multiple Choice</span>
                    <button id="translate-toggle-btn" class="btn-toggle-lang"><i class="fa-solid fa-lightbulb"></i> Gợi ý & Dịch thuật</button>
                </div>
                
                <div class="prompt-container">
                    <h2 class="question-prompt" id="question-prompt-en"></h2>
                    <h2 class="question-prompt-vi hidden" id="question-prompt-vi"></h2>
                </div>
                
                <div class="options-container" id="options-container">
                    <!-- Options injected here via JS -->
                </div>

                <div class="action-buttons">
                    <button id="submit-btn" class="btn btn-primary" disabled>Kiểm tra Đáp án</button>
                    <button id="next-btn" class="btn btn-secondary hidden">Câu tiếp theo <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div class="explanation-section hidden" id="explanation-section">
                <div class="explanation-header">
                    <h3><i class="fa-solid fa-lightbulb"></i> Giải thích chi tiết (Tiếng Việt)</h3>
                </div>
                <div class="explanation-content" id="explanation-content">
                    <!-- Explanation injected here -->
                </div>
            </div>
            
            <div class="completion-section hidden" id="completion-section">
                <h2>Chúc mừng bạn đã hoàn thành!</h2>
                <div class="final-score">
                    <span id="final-score-value">0</span>%
                </div>
                <p>Kết quả ôn tập của bạn</p>
                <button id="restart-btn" class="btn btn-primary">Ôn tập lại <i class="fa-solid fa-rotate-right"></i></button>
            </div>
        </main>
        
        <footer>
            <p>Xây dựng để <strong>hiểu sâu</strong>, không chỉ là học thuộc.</p>
        </footer>
    </div>
    
    <script src="app.js?v=2"></script>
</body>
</html>
